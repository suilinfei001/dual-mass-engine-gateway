[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    p0: Core functionality tests (must pass)
    p1: Important functionality tests
    p2: Auxiliary functionality tests
    p3: Boundary condition tests
    e2e: End-to-end tests
    api: API interface tests
